name: PR Slack Notification

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - review_requested
      - closed
  pull_request_review:
    types:
      - submitted

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Set Slack Message
        id: slack
        run: |
          ACTION="${{ github.event.action }}"
          MERGED="${{ github.event.pull_request.merged }}"
          REVIEW_STATE="${{ github.event.review.state }}"

          TITLE="đź”” PR Event"
          COLOR="good"

          if [ "$ACTION" = "opened" ]; then
            TITLE="đźź˘ PR Opened"
            COLOR="good"
          elif [ "$ACTION" = "reopened" ]; then
            TITLE="đź”„ PR Reopened"
            COLOR="#36c5f0"
          elif [ "$ACTION" = "ready_for_review" ]; then
            TITLE="đź‘€ Ready For Review"
            COLOR="warning"
          elif [ "$ACTION" = "review_requested" ]; then
            TITLE="đź‘€ Review Requested"
            COLOR="warning"
          elif [ "$ACTION" = "submitted" ]; then
            if [ "$REVIEW_STATE" = "approved" ]; then
              TITLE="âś… PR Approved"
              COLOR="good"
            elif [ "$REVIEW_STATE" = "changes_requested" ]; then
              TITLE="đź”´ Changes Requested"
              COLOR="danger"
            else
              TITLE="đź’¬ Review Commented"
              COLOR="#36c5f0"
            fi
          elif [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
            TITLE="đźŽ‰ PR Merged"
            COLOR="good"
          elif [ "$ACTION" = "closed" ]; then
            TITLE="đź”’ PR Closed"
            COLOR="danger"
          fi

          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "color=$COLOR" >> $GITHUB_OUTPUT

      - name: Notify Slack PR Event
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_GITHUB_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.slack.outputs.color }}",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "${{ steps.slack.outputs.title }}"
                      }
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*đź“¦ Repository*\n`${{ github.repository }}`\n\n*đźŚż Branch*\n`${{ github.event.pull_request.head.ref }} â†’ ${{ github.event.pull_request.base.ref }}`\n\n*đź‘¤ Author*\n`${{ github.event.pull_request.user.login }}`\n\n*đź“ť PR Title*\n`${{ github.event.pull_request.title }}`\n\n*đź”˘ PR Number*\n`#${{ github.event.pull_request.number }}`\n\n*âš™ď¸Ź Action*\n`${{ github.event.action }}`"
                      }
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": {
                            "type": "plain_text",
                            "text": "PR ëł´ę¸°"
                          },
                          "url": "${{ github.event.pull_request.html_url }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
