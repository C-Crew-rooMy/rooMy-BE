name: Deploy Dev Backend

on:
  push:
    branches: [dev]

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e

            cd /home/ec2-user/rooMy-BE

            git fetch origin
            git checkout dev
            git pull origin dev

            pnpm install --frozen-lockfile
            pnpm prisma generate
            pnpm prisma migrate deploy
            pnpm build

            pm2 restart roomy-backend
            pm2 save

            for i in {1..10}; do
              if curl -fsS http://localhost:3000/health > /dev/null; then
                echo "Health check passed"
                exit 0
              fi

              echo "Waiting for application startup... ($i/10)"
              sleep 3
            done

            echo "Health check failed"

            pm2 logs --lines 100 --nostream

            exit 1

      - name: Notify Slack - Success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"🚀 RooMy Backend dev 자동 배포 성공\n브랜치: dev\n커밋: ${{ github.sha }}\n작성자: ${{ github.actor }}\"}" \
              "$SLACK_WEBHOOK_URL"
          fi

      - name: Notify Slack - Failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"❌ RooMy Backend dev 자동 배포 실패\n브랜치: dev\n커밋: ${{ github.sha }}\n작성자: ${{ github.actor }}\nActions 로그를 확인해주세요.\"}" \
              "$SLACK_WEBHOOK_URL"
          fi
