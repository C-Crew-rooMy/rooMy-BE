name: Deploy Dev Backend

on:
  push:
    branches: [dev]

  workflow_dispatch:

jobs:
  check:
    name: Check Before Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Deploy backend to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e

            cd /home/ec2-user/rooMy-BE

            git fetch origin
            git checkout dev
            git pull origin dev

            pnpm install --frozen-lockfile
            pnpm prisma generate
            pnpm prisma migrate deploy
            pnpm build

            pm2 restart roomy-backend
            pm2 save

            curl -f http://localhost:3000

      - name: Notify Slack - Success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.DEPLOY_SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"🚀 RooMy Backend dev 배포 성공\n브랜치: dev\n커밋: ${{ github.sha }}\n작성자: ${{ github.actor }}\"}" \
              "$SLACK_WEBHOOK_URL"
          fi

      - name: Notify Slack - Failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.DEPLOY_SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"❌ RooMy Backend dev 배포 실패\n브랜치: dev\n커밋: ${{ github.sha }}\n작성자: ${{ github.actor }}\nActions 로그를 확인해주세요.\"}" \
              "$SLACK_WEBHOOK_URL"
          fi
