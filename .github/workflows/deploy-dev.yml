name: Deploy Dev Backend

on:
  push:
    branches: [dev]

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: roomy-dev-deploy

      - name: Verify AWS authentication
        run: aws sts get-caller-identity

      - name: Deploy backend through SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          cat > deploy-script.sh <<'DEPLOY_SCRIPT'
          set -e

          sudo -iu ec2-user bash <<'EC2_SCRIPT'
          set -e

          export PNPM_HOME="/home/ec2-user/.local/share/pnpm"
          export PATH="$PNPM_HOME:/usr/local/bin:/usr/bin:$PATH"

          cd /home/ec2-user/rooMy-BE

          git fetch origin
          git checkout dev
          git pull origin dev

          pnpm install --frozen-lockfile
          pnpm prisma generate
          pnpm prisma migrate deploy
          pnpm build

          pm2 restart roomy-backend
          pm2 save

          for i in {1..10}; do
            if curl -fsS http://localhost:3000/health > /dev/null; then
              echo "Health check passed"
              exit 0
            fi

            echo "Waiting for application startup... ($i/10)"
            sleep 3
          done

          echo "Health check failed"
          pm2 logs roomy-backend --lines 100 --nostream
          exit 1
          EC2_SCRIPT
          DEPLOY_SCRIPT

          PARAMETERS=$(jq -n \
            --rawfile script deploy-script.sh \
            '{commands: [$script]}')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy RooMy backend dev" \
            --parameters "$PARAMETERS" \
            --timeout-seconds 900 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          for i in {1..120}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "Deployment status: $STATUS"

            case "$STATUS" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$EC2_INSTANCE_ID" \
                  --query "StandardOutputContent" \
                  --output text
                exit 0
                ;;

              Failed|Cancelled|TimedOut|"Delivery Timed Out"|"Execution Timed Out")
                echo "Deployment failed"

                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$EC2_INSTANCE_ID" \
                  --query "{Output:StandardOutputContent,Error:StandardErrorContent}" \
                  --output json || true

                exit 1
                ;;

              *)
                sleep 5
                ;;
            esac
          done

          echo "Deployment status check timed out"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}" \
            --output json || true

          exit 1

      - name: Notify Slack - Success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"🚀 RooMy Backend dev 자동 배포 성공\n브랜치: dev\n커밋: ${{ github.sha }}\n작성자: ${{ github.actor }}\"}" \
              "$SLACK_WEBHOOK_URL"
          fi

      - name: Notify Slack - Failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"❌ RooMy Backend dev 자동 배포 실패\n브랜치: dev\n커밋: ${{ github.sha }}\n작성자: ${{ github.actor }}\nActions 로그를 확인해주세요.\"}" \
              "$SLACK_WEBHOOK_URL"
          fi
